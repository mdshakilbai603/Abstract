<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABSTRACT | ENCRYPTED ECOSYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050505;
            --accent: #e0c097;
            --silver: #a1a1aa;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(224, 192, 151, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- ৩ সেকেন্ডের সলিড ইন্ট্রো --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            transition: 1.5s cubic-bezier(1, 0, 0, 1);
        }
        .loader-logo { font-family: 'Playfair Display'; font-size: 2.5rem; letter-spacing: 20px; color: var(--accent); animation: pulse 3s infinite; }

        /* --- মেইন অ্যাপ ড্যাশবোর্ড --- */
        .app-container { display: flex; height: 100vh; width: 100vw; opacity: 0; transition: 2s; }
        .loaded .app-container { opacity: 1; }

        /* সাইডবার (নেভিগেশন) */
        nav { width: 80px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; background: #000; }
        nav i { font-size: 1.5rem; color: var(--silver); margin-bottom: 40px; cursor: pointer; transition: 0.3s; }
        nav i:hover, nav i.active { color: var(--accent); }

        /* প্রোফাইল ও চ্যাট লিস্ট */
        .sidebar-panel { width: 350px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .search-box { padding: 20px; border-bottom: 1px solid var(--border); }
        .search-box input { width: 100%; background: var(--glass); border: 1px solid var(--border); padding: 12px; color: #fff; border-radius: 5px; }

        /* চ্যাট এরিয়া */
        main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%); }
        .chat-header { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

        /* মেসেজ বাবল */
        .msg { max-width: 60%; padding: 15px 20px; border-radius: 20px; font-size: 0.9rem; line-height: 1.5; }
        .msg.sent { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: var(--glass); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* ইনপুট এরিয়া */
        .input-area { padding: 30px 40px; display: flex; gap: 20px; align-items: center; border-top: 1px solid var(--border); }
        .input-area input { flex: 1; background: transparent; border: none; font-size: 1rem; color: #fff; }
        .tools i { margin-left: 20px; color: var(--silver); cursor: pointer; }

        /* প্রোফাইল সেটআপ (Modal) */
        #profile-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999;
            display: none; justify-content: center; align-items: center;
        }
        .setup-card { width: 500px; padding: 50px; background: #0a0a0a; border: 1px solid var(--accent); }
        .setup-card h2 { font-family: 'Playfair Display'; font-size: 2rem; margin-bottom: 30px; color: var(--accent); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.7rem; color: var(--silver); margin-bottom: 8px; letter-spacing: 2px; }
        .form-group input, .form-group textarea { width: 100%; background: var(--glass); border: 1px solid var(--border); padding: 12px; color: #fff; }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; letter-spacing: 25px; } }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-logo">ABSTRACT</div></div>

    <div id="profile-modal">
        <div class="setup-card">
            <h2>IDENTITY_SETUP</h2>
            <div class="form-group">
                <label>PROFILE IMAGE</label>
                <input type="file" id="u-img" accept="image/*">
            </div>
            <div class="form-group">
                <label>FULL NAME</label>
                <input type="text" id="u-name" placeholder="আপনার নাম লিখুন">
            </div>
            <div class="form-group">
                <label>BIO / OPINION</label>
                <textarea id="u-bio" rows="3" placeholder="আপনার মতামত..."></textarea>
            </div>
            <div class="form-group">
                <label>CONTACT (PUBLIC/PRIVATE)</label>
                <input type="text" id="u-phone" placeholder="+880...">
            </div>
            <button onclick="saveProfile()" style="background: var(--accent); border: none; padding: 15px 30px; font-weight: 700; cursor: pointer; width: 100%;">ACTIVATE PROTOCOL</button>
        </div>
    </div>

    <div class="app-container">
        <nav>
            <i class="fas fa-ghost active"></i>
            <i class="fas fa-comment-alt"></i>
            <i class="fas fa-user-shield" onclick="openProfile()"></i>
            <i class="fas fa-map-marker-alt" onclick="trackLocation()"></i>
            <i class="fas fa-sign-out-alt" style="margin-top: auto;" onclick="deleteAccount()"></i>
        </nav>

        <div class="sidebar-panel">
            <div class="search-box"><input type="text" placeholder="Search Encrypted Users..."></div>
            <div id="user-list" style="flex: 1; overflow-y: auto;">
                </div>
        </div>

        <main>
            <div class="chat-header">
                <div>
                    <h3 id="target-name">XENITHRA_NODE</h3>
                    <small style="color: var(--accent);">● SECURE CONNECTION</small>
                </div>
                <div class="tools">
                    <i class="fas fa-phone"></i>
                    <i class="fas fa-video"></i>
                    <i class="fas fa-info-circle"></i>
                </div>
            </div>

            <div class="chat-messages" id="chat-box">
                <div class="msg received">সিস্টেম লোড হয়েছে। আপনার এনক্রিপ্টেড চ্যাট শুরু করুন।</div>
                <div class="msg sent">লোকেশন ট্র্যাকিং এবং সিকিউরিটি একটিভ আছে।</div>
            </div>

            <div class="input-area">
                <i class="far fa-smile" style="color: var(--silver);"></i>
                <input type="text" id="msg-input" placeholder="সুরক্ষিত বার্তা লিখুন...">
                <div class="tools">
                    <i class="fas fa-paperclip"></i>
                    <i class="fas fa-gift"></i>
                    <i class="fas fa-paper-plane" style="color: var(--accent);" onclick="sendMsg()"></i>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ৩ সেকেন্ডের লোডার এবং অটো প্রোফাইল চেক
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.transform = 'translateY(-100%)';
                document.body.classList.add('loaded');
                
                // যদি আগে প্রোফাইল না থাকে তবে সেটআপ দেখাবে
                if(!localStorage.getItem('abs_user')) {
                    document.getElementById('profile-modal').style.display = 'flex';
                }
            }, 3000);
        };

        function saveProfile() {
            const data = {
                name: document.getElementById('u-name').value,
                bio: document.getElementById('u-bio').value,
                phone: document.getElementById('u-phone').value,
                verified: true
            };
            localStorage.setItem('abs_user', JSON.stringify(data));
            document.getElementById('profile-modal').style.display = 'none';
            alert("প্রোফাইল একটিভেট হয়েছে!");
        }

        function sendMsg() {
            const val = document.getElementById('msg-input').value;
            if(!val) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg sent';
            msgDiv.innerText = val;
            document.getElementById('chat-box').appendChild(msgDiv);
            document.getElementById('msg-input').value = '';
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        // লোকেশন ট্র্যাক (ব্রাউজার বেজড)
        function trackLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    alert(`আপনার বর্তমান অবস্থান: Lat ${pos.coords.latitude}, Lon ${pos.coords.longitude}\nএটি এখন আপনার ইকোসিস্টেমে সুরক্ষিত আছে।`);
                });
            }
        }

        function deleteAccount() {
            if(confirm("আপনি কি নিশ্চিতভাবে আপনার অ্যাকাউন্ট এবং সব ডেটা ডিলিট করতে চান?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
