<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAISA | আলটিমেট ডিজিটাল কোর</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-black: #020205;
            --indigo: #4f46e5;
            --crimson: #dc2626;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Hind Siliguri', sans-serif; }
        body { background: var(--bg-black); color: #fff; overflow-x: hidden; }

        /* --- ৩ সেকেন্ডের ডিজিটাল গ্লিচ এনিমেশন --- */
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; animation: exit 0.8s cubic-bezier(1,0,0,1) 3s forwards;
        }
        .glitch-text {
            font-family: 'Syncopate'; font-size: 3rem; letter-spacing: 15px;
            color: var(--indigo); animation: glitch 0.3s infinite;
        }
        .progress-bar { width: 200px; height: 2px; background: #222; margin-top: 20px; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: var(--crimson); animation: load 3s linear forwards; }

        @keyframes load { to { width: 100%; } }
        @keyframes glitch { 0% { transform: skew(2deg); } 50% { transform: skew(-2deg); color: var(--crimson); } 100% { transform: skew(0); } }
        @keyframes exit { to { transform: translateY(-100%); visibility: hidden; } }

        /* --- মেইন পোর্টাল ডিজাইন --- */
        #portal { opacity: 0; animation: fadeIn 1s ease 3.5s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        header { padding: 40px 6%; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .sys-id { font-family: 'Syncopate'; font-size: 0.8rem; color: var(--indigo); letter-spacing: 4px; }

        .main-hero { padding: 80px 6%; }
        .main-hero h1 { font-size: 7rem; font-weight: 900; line-height: 0.8; letter-spacing: -5px; }
        .main-hero span { color: var(--indigo); }

        /* প্রোফাইল সেটআপ সিস্টেম */
        .profile-hub { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 40px; padding: 0 6%; }
        
        .profile-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 50px;
            padding: 60px; position: relative; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .profile-card:hover { background: rgba(79, 70, 229, 0.05); border-color: var(--indigo); transform: scale(1.02); }

        /* ফটো আপলোড সেকশন */
        .photo-uploader {
            width: 180px; height: 180px; border-radius: 50%; border: 3px solid var(--indigo);
            margin-bottom: 30px; position: relative; overflow: hidden; background: #111;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
        .photo-uploader img { width: 100%; height: 100%; object-fit: cover; }
        .photo-uploader .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center; opacity: 0; transition: 0.3s;
        }
        .photo-uploader:hover .overlay { opacity: 1; }

        .profile-card h2 { font-size: 3.5rem; margin-bottom: 20px; font-family: 'Syncopate'; }
        .status-badge { display: inline-block; padding: 8px 20px; background: var(--crimson); font-size: 0.7rem; font-weight: 900; border-radius: 5px; margin-bottom: 20px; }

        .data-point { font-size: 1.2rem; margin-bottom: 12px; color: #888; display: flex; align-items: center; }
        .data-point i { margin-right: 15px; color: var(--indigo); }

        /* গ্যালারি */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 100px 6%; }
        .gallery-item { height: 400px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        footer { padding: 100px; text-align: center; opacity: 0.2; font-family: 'Syncopate'; font-size: 0.6rem; letter-spacing: 10px; }

        @media (max-width: 768px) { .main-hero h1 { font-size: 3.5rem; } .profile-hub { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="glitch-text">RAISA_CORE</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <div id="portal">
        <header>
            <div class="sys-id">SECURE NODE: 0x992</div>
            <div style="font-weight: 900; color: var(--crimson);">TOP_SECRET</div>
        </header>

        <section class="main-hero">
            <h1>PRIVATE <br><span>ARCHIVE</span> v.9</h1>
            <p style="margin-top: 20px; color: #444; font-weight: 700;">ব্যারিস্টার রাইসা ও ডেভেলপার শাকিল এর যৌথ ডিজিটাল কোর।</p>
        </section>

        <section class="profile-hub">
            <div class="profile-card">
                <div class="status-badge">BARRISTER-AT-LAW</div>
                <div class="photo-uploader" onclick="document.getElementById('p1').click()">
                    <img id="view1" src="https://via.placeholder.com/180" alt="Raisa">
                    <div class="overlay"><i class="fas fa-camera"></i></div>
                </div>
                <input type="file" id="p1" style="display: none;" onchange="updateProfile(this, 'view1', 'raisa_p')">
                
                <h2>Raisa</h2>
                <div class="data-point"><i class="fas fa-university"></i> LSE, London</div>
                <div class="data-point"><i class="fas fa-map-pin"></i> Manchester, UK</div>
                <div class="data-point"><i class="fas fa-calendar"></i> 19 March, 2005</div>
            </div>

            <div class="profile-card">
                <div class="status-badge" style="background: var(--indigo);">AI ARCHITECT</div>
                <div class="photo-uploader" onclick="document.getElementById('p2').click()">
                    <img id="view2" src="https://via.placeholder.com/180" alt="Shakil">
                    <div class="overlay"><i class="fas fa-camera"></i></div>
                </div>
                <input type="file" id="p2" style="display: none;" onchange="updateProfile(this, 'view2', 'shakil_p')">

                <h2>Shakil</h2>
                <div class="data-point"><i class="fas fa-terminal"></i> SaaS Specialist</div>
                <div class="data-point"><i class="fas fa-globe"></i> 195 Countries Reach</div>
                <div class="data-point"><i class="fas fa-code-branch"></i> Universal-Save Dev</div>
            </div>
        </section>

        <section class="gallery-grid" id="wall">
            </section>

        <footer>CODED_BY_SHAKIL_ARCHITECT_2026</footer>
    </div>

    <script>
        // প্রোফাইল ফটো আপলোড এবং লোকাল স্টোরেজে সেভ করার ফাংশন
        function updateProfile(input, viewId, storageKey) {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById(viewId).src = e.target.result;
                    localStorage.setItem(storageKey, e.target.result);
                };
                reader.readAsDataURL(file);
            }
        }

        // পেজ লোড হলে সেভ করা ফটো দেখানো
        window.onload = () => {
            if(localStorage.getItem('raisa_p')) document.getElementById('view1').src = localStorage.getItem('raisa_p');
            if(localStorage.getItem('shakil_p')) document.getElementById('view2').src = localStorage.getItem('shakil_p');
        };
    </script>
</body>
</html>
