<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABSTRACT | Core Operating System</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <style>
        :root {
            --pitch-black: #000000;
            --pure-white: #ffffff;
            --text-dim: #101010;
            --text-muted: #555555;
            --accent-color: #ffcc00;
            --border-deep: #0a0a0a;
            --glow-color: rgba(255, 204, 0, 0.05);
            --card-bg: #020202;
            --active-node-bg: #ffd700;
            --active-node-text: #000000;
            --error-color: #ff3b30;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--pitch-black);
            color: var(--pure-white);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
        }

        /* Cinematic Intro Animation */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--pitch-black);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .intro-text-wrapper {
            text-align: center;
            perspective: 1200px;
        }

        .intro-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 8vw, 8rem);
            font-weight: 700;
            letter-spacing: 18px;
            color: var(--pure-white);
            opacity: 0;
            transform: translateY(70px) rotateX(-40deg);
            text-shadow: 0 0 50px rgba(255, 255, 255, 0.18);
        }

        .intro-subtitle {
            font-size: 0.8rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 4.5rem;
            opacity: 0;
            transform: translateY(35px);
        }

        /* Authentication UI */
        #auth-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--pitch-black);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
        }

        .auth-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-deep);
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            padding: 4rem 3.2rem;
            display: flex;
            flex-direction: column;
            gap: 2.8rem;
            box-shadow: 0 0 120px rgba(0, 0, 0, 0.98), inset 0 0 40px var(--glow-color);
        }

        .auth-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .auth-title {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            letter-spacing: 4.5px;
            color: var(--pure-white);
        }

        .auth-subtitle {
            font-size: 0.78rem;
            letter-spacing: 1.8px;
            color: var(--text-muted);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-label {
            font-size: 0.65rem;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .auth-input {
            background-color: var(--pitch-black);
            border: 1px solid var(--border-deep);
            border-radius: 14px;
            padding: 16px 22px;
            color: var(--pure-white);
            font-size: 0.88rem;
            letter-spacing: 1.2px;
            outline: none;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            width: 100%;
        }

        .auth-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 28px var(--glow-color);
        }

        .auth-button {
            background-color: var(--accent-color);
            color: var(--active-node-text);
            border: none;
            border-radius: 14px;
            padding: 18px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 3.5px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            text-transform: uppercase;
        }

        .auth-button:hover {
            opacity: 0.94;
            box-shadow: 0 0 45px rgba(255, 204, 0, 0.45);
            transform: translateY(-2px);
        }

        .auth-switch {
            text-align: center;
            font-size: 0.78rem;
            letter-spacing: 1.6px;
            color: var(--text-muted);
        }

        .auth-switch span {
            color: var(--accent-color);
            cursor: pointer;
            font-weight: 600;
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.75rem;
            letter-spacing: 0.9px;
            display: none;
        }

        /* Workspace Core Window */
        .workspace {
            width: 98vw;
            height: 96vh;
            max-width: 1440px;
            max-height: 880px;
            background-color: var(--pitch-black);
            border: 1px solid var(--border-deep);
            border-radius: 26px;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            box-shadow: 0 0 150px rgba(0, 0, 0, 0.99), inset 0 0 65px var(--glow-color);
            opacity: 0;
            transform: scale(0.96);
            position: relative;
            z-index: 1;
            visibility: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 96px;
            background-color: var(--pitch-black);
            border-right: 1px solid var(--border-deep);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4.2rem 0;
            gap: 4.6rem;
            z-index: 10;
        }

        .logo-vertical {
            font-family: 'Cinzel', serif;
            font-size: 0.82rem;
            letter-spacing: 5.5px;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            color: var(--accent-color);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .logo-vertical:hover {
            color: var(--pure-white);
        }

        .nav-icon {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .nav-icon:hover, .nav-icon.active {
            color: var(--accent-color);
            border-color: rgba(255, 204, 0, 0.32);
            box-shadow: 0 0 35px rgba(255, 204, 0, 0.26);
            transform: scale(1.12) translateY(-3px);
        }

        /* Content Container */
        .content-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--pitch-black);
            height: 100%;
        }

        /* Header UI */
        .header {
            height: 100px;
            border-bottom: 1px solid var(--border-deep);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5.5rem;
        }

        .header-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            letter-spacing: 5.5px;
            color: var(--pure-white);
        }

        .header-status-badge {
            font-size: 0.72rem;
            letter-spacing: 2.8px;
            color: var(--accent-color);
            border: 1px solid rgba(255, 204, 0, 0.3);
            padding: 9px 22px;
            border-radius: 14px;
            background-color: var(--pitch-black);
        }

        /* Main Workspace Body */
        .main-body {
            flex: 1;
            padding: 4.2rem 5.5rem;
            display: flex;
            flex-direction: column;
            gap: 3.5rem;
            overflow-y: auto;
        }

        .body-top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2.6rem;
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 2.6rem;
        }

        .net-core-title {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            letter-spacing: 4.5px;
            color: var(--pure-white);
        }

        .badge-active {
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 4px;
            background-color: var(--active-node-bg);
            color: var(--active-node-text);
            padding: 8px 20px;
            border-radius: 22px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.32);
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 480px;
        }

        .search-input {
            width: 100%;
            background-color: var(--pitch-black);
            border: 1px solid var(--border-deep);
            border-radius: 18px;
            padding: 16px 24px 16px 62px;
            color: var(--pure-white);
            font-size: 0.92rem;
            letter-spacing: 1.6px;
            outline: none;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 35px var(--glow-color);
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 22px;
            height: 22px;
        }

        /* Node Input Control Module */
        .node-add-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-deep);
            border-radius: 20px;
            padding: 2.6rem 3.2rem;
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .add-input {
            background-color: var(--pitch-black);
            border: 1px solid var(--border-deep);
            border-radius: 14px;
            padding: 14px 18px;
            color: var(--pure-white);
            font-size: 0.85rem;
            outline: none;
            flex: 1;
            min-width: 220px;
            transition: all 0.35s ease;
        }

        .add-input:focus {
            border-color: var(--accent-color);
        }

        .add-btn {
            background-color: var(--accent-color);
            color: var(--active-node-text);
            border: none;
            border-radius: 14px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 2.5px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.45s ease;
        }

        .add-btn:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.35);
        }

        /* Nodes Grid Section */
        .nodes-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.88rem;
            letter-spacing: 1.8px;
            padding: 4.5rem 0;
            border: 1px dashed var(--border-deep);
            border-radius: 18px;
        }

        .node-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-deep);
            border-radius: 20px;
            padding: 2.4rem 3.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .node-card:hover {
            border-color: rgba(255, 204, 0, 0.25);
            box-shadow: 0 0 60px rgba(255, 204, 0, 0.1);
            transform: translateY(-1px);
        }

        .node-details {
            display: flex;
            align-items: center;
            gap: 2.8rem;
        }

        .avatar {
            width: 78px;
            height: 78px;
            background-color: var(--pitch-black);
            border: 1px solid var(--border-deep);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: var(--accent-color);
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .status-dot {
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: #00ff66;
            border-radius: 50%;
            bottom: 2px;
            right: 2px;
            box-shadow: 0 0 12px #00ff66;
        }

        .node-info-text {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .node-name {
            font-size: 1.45rem;
            font-weight: 600;
            letter-spacing: 1.2px;
        }

        .node-location {
            font-size: 0.82rem;
            letter-spacing: 1.6px;
            color: var(--text-muted);
        }

        .node-type-badge {
            font-size: 0.82rem;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .action-buttons {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-base {
            background: transparent;
            border: 1px solid var(--border-deep);
            border-radius: 9px;
            padding: 7px 16px;
            font-size: 0.7rem;
            cursor: pointer;
            letter-spacing: 1.4px;
            transition: all 0.35s ease;
        }

        .edit-btn {
            color: var(--accent-color);
        }

        .edit-btn:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 12px rgba(255, 204, 0, 0.2);
        }

        .delete-btn {
            color: var(--error-color);
        }

        .delete-btn:hover {
            border-color: var(--error-color);
            box-shadow: 0 0 12px rgba(255, 59, 48, 0.2);
        }

        .logout-btn {
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--border-deep);
            padding: 9px 22px;
            border-radius: 14px;
            font-size: 0.82rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .logout-btn:hover {
            border-color: #ff3333;
            color: #ff3333;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.2);
        }

        /* Responsive */
        @media screen and (max-width: 768px) {
            .workspace {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                border: none;
            }

            .sidebar {
                width: 68px;
                padding: 1.8rem 0;
                gap: 2.4rem;
            }

            .logo-vertical {
                font-size: 0.62rem;
            }

            .nav-icon {
                width: 44px;
                height: 44px;
            }

            .header {
                height: 84px;
                padding: 0 2rem;
            }

            .header-title {
                font-size: 1.05rem;
            }

            .main-body {
                padding: 2rem;
                gap: 2.6rem;
            }

            .net-core-title {
                font-size: 2rem;
            }

            .body-top-section {
                flex-direction: column;
                align-items: stretch;
                gap: 2rem;
            }

            .node-add-container {
                gap: 1.4rem;
            }

            .node-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 2rem;
                padding: 1.8rem;
            }

            .node-details {
                width: 100%;
                justify-content: space-between;
            }

            .node-type-badge {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-text-wrapper">
            <div class="intro-title" id="titleText">ABSTRACT</div>
            <div class="intro-subtitle" id="subtitleText">INITIALIZING GLOBAL DATA PLATFORM</div>
        </div>
    </div>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-title" id="formTitle">SIGN IN</div>
                <div class="auth-subtitle">ENTER THE SECURE ENVIRONMENT</div>
            </div>

            <form class="auth-form" id="authForm" onsubmit="handleAuthentication(event)">
                <div class="input-group">
                    <span class="input-label">Username</span>
                    <input type="text" class="auth-input" id="username" placeholder="USERNAME" required>
                </div>
                
                <div class="input-group" id="emailGroup" style="display: none;">
                    <span class="input-label">Email Address</span>
                    <input type="email" class="auth-input" id="email" placeholder="core@example.com">
                </div>

                <div class="input-group">
                    <span class="input-label">Security Key / Password</span>
                    <input type="password" class="auth-input" id="password" placeholder="••••••••" required>
                </div>

                <span class="error-message" id="errorMessage">Invalid credentials. System access denied.</span>

                <button type="submit" class="auth-button" id="submitBtn">Authenticate</button>
            </form>

            <div class="auth-switch">
                <span id="switchText">New here? <span onclick="toggleMode()">Create an account</span></span>
            </div>
        </div>
    </div>

    <div class="workspace" id="mainWorkspace">
        
        <aside class="sidebar">
            <div class="logo-vertical">ABSTRACT</div>
            
            <div class="nav-icon active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                </svg>
            </div>

            <div class="nav-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                    <polyline points="2 17 12 22 22 17"/>
                    <polyline points="2 12 12 17 22 12"/>
                </svg>
            </div>

            <div class="nav-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </div>
        </aside>

        <div class="content-container">
            <header class="header">
                <div class="header-title">ABSTRACT CORE</div>
                <div style="display: flex; gap: 2rem; align-items: center;">
                    <div class="header-status-badge">SYSTEM STABLE</div>
                    <button class="logout-btn" onclick="handleLogout()">LOGOUT</button>
                </div>
            </header>

            <main class="main-body">
                
                <div class="body-top-section">
                    <div class="title-wrapper">
                        <h1 class="net-core-title">NET_CORE</h1>
                        <span class="badge-active">ACTIVE</span>
                    </div>

                    <div class="search-container">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" class="search-input" placeholder="Search Active Node..." oninput="filterNodes(this.value)">
                    </div>
                </div>

                <div class="node-add-container">
                    <input type="hidden" id="editIndex" value="">
                    <input type="text" class="add-input" id="nodeName" placeholder="Node Name" required>
                    <input type="text" class="add-input" id="nodeLocation" placeholder="Location" required>
                    <input type="text" class="add-input" id="nodeType" placeholder="Node Type" required>
                    <input type="file" class="add-input" id="nodeImage" accept="image/*">
                    <button class="add-btn" id="submitNodeBtn" onclick="saveNode()">Add Node</button>
                </div>

                <div class="nodes-grid" id="nodesContainer">
                    </div>

            </main>
        </div>
    </div>

    <script>
        let isSignUp = false;
        let authDatabase = [];
        let nodes = JSON.parse(localStorage.getItem('saved_nodes')) || [];

        document.addEventListener("DOMContentLoaded", () => {
            // Load Auth Database from LocalStorage
            authDatabase = JSON.parse(localStorage.getItem('users_auth_db')) || [];
            
            const tl = gsap.timeline();
            
            tl.to("#titleText", {
                opacity: 1,
                y: 0,
                duration: 1.6,
                ease: "power4.out"
            })
            .to("#subtitleText", {
                opacity: 1,
                y: 0,
                duration: 0.8,
                ease: "power2.out"
            }, "-=0.7")
            .to("#intro-screen", {
                opacity: 0,
                duration: 1.2,
                ease: "power3.inOut",
                delay: 1.5
            })
            .set("#intro-screen", { display: "none" })
            .to("#auth-screen", {
                opacity: 1,
                duration: 0.8,
                ease: "power2.out"
            })
            .set("#auth-screen", { pointerEvents: "all" });

            renderNodes();
        });

        function renderNodes() {
            const container = document.getElementById('nodesContainer');
            container.innerHTML = '';

            if (nodes.length === 0) {
                container.innerHTML = `<div class="empty-state">No nodes currently initialized. Build your first node object above.</div>`;
                return;
            }

            nodes.forEach((node, index) => {
                const card = document.createElement('div');
                card.className = 'node-card';
                
                let imageStyle = '';
                if (node.image) {
                    imageStyle = `background-image: url('${node.image}')`;
                }

                card.innerHTML = `
                    <div class="node-details">
                        <div class="avatar" style="${imageStyle}">
                            ${node.image ? '' : node.initials}
                            <span class="status-dot"></span>
                        </div>
                        <div class="node-info-text">
                            <span class="node-name">${node.name}</span>
                            <span class="node-location">${node.location}</span>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <span class="node-type-badge">${node.type}</span>
                        <button class="btn-base edit-btn" onclick="editNode(${index})">EDIT</button>
                        <button class="btn-base delete-btn" onclick="deleteNode(${index})">REMOVE</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterNodes(query) {
            const container = document.getElementById('nodesContainer');
            container.innerHTML = '';

            const filtered = nodes.filter(n => 
                n.name.toLowerCase().includes(query.toLowerCase()) || 
                n.location.toLowerCase().includes(query.toLowerCase())
            );

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state">No matching node objects found.</div>`;
                return;
            }

            filtered.forEach((node) => {
                const index = nodes.indexOf(node);
                const card = document.createElement('div');
                card.className = 'node-card';
                
                let imageStyle = '';
                if (node.image) {
                    imageStyle = `background-image: url('${node.image}')`;
                }

                card.innerHTML = `
                    <div class="node-details">
                        <div class="avatar" style="${imageStyle}">
                            ${node.image ? '' : node.initials}
                            <span class="status-dot"></span>
                        </div>
                        <div class="node-info-text">
                            <span class="node-name">${node.name}</span>
                            <span class="node-location">${node.location}</span>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <span class="node-type-badge">${node.type}</span>
                        <button class="btn-base edit-btn" onclick="editNode(${index})">EDIT</button>
                        <button class="btn-base delete-btn" onclick="deleteNode(${index})">REMOVE</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function saveNode() {
            const name = document.getElementById('nodeName').value;
            const location = document.getElementById('nodeLocation').value;
            const type = document.getElementById('nodeType').value;
            const editIndex = document.getElementById('editIndex').value;
            const imageFile = document.getElementById('nodeImage').files[0];

            if (!name || !location || !type) {
                alert("Please fill all required input fields.");
                return;
            }

            const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);

            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    if (editIndex !== "") {
                        nodes[editIndex] = { name, location, type, initials, image: e.target.result };
                        document.getElementById('editIndex').value = "";
                        document.getElementById('submitNodeBtn').innerText = "Add Node";
                    } else {
                        nodes.push({ name, location, type, initials, image: e.target.result });
                    }
                    updateStorage();
                };
                reader.readAsDataURL(imageFile);
            } else {
                if (editIndex !== "") {
                    // Retain existing image if not being updated
                    const existingImage = nodes[editIndex].image;
                    nodes[editIndex] = { name, location, type, initials, image: existingImage };
                    document.getElementById('editIndex').value = "";
                    document.getElementById('submitNodeBtn').innerText = "Add Node";
                } else {
                    nodes.push({ name, location, type, initials, image: null });
                }
                updateStorage();
            }
        }

        function updateStorage() {
            localStorage.setItem('saved_nodes', JSON.stringify(nodes));
            renderNodes();
            clearInputs();
        }

        function deleteNode(index) {
            nodes.splice(index, 1);
            updateStorage();
        }

        function editNode(index) {
            const node = nodes[index];
            document.getElementById('nodeName').value = node.name;
            document.getElementById('nodeLocation').value = node.location;
            document.getElementById('nodeType').value = node.type;
            document.getElementById('editIndex').value = index;
            document.getElementById('submitNodeBtn').innerText = "Save Node";
        }

        function clearInputs() {
            document.getElementById('nodeName').value = '';
            document.getElementById('nodeLocation').value = '';
            document.getElementById('nodeType').value = '';
            document.getElementById('nodeImage').value = '';
        }

        function toggleMode() {
            isSignUp = !isSignUp;
            const formTitle = document.getElementById('formTitle');
            const submitBtn = document.getElementById('submitBtn');
            const switchText = document.getElementById('switchText');
            const emailGroup = document.getElementById('emailGroup');

            if (isSignUp) {
                formTitle.innerText = "SIGN UP";
                submitBtn.innerText = "Register";
                switchText.innerHTML = 'Already registered? <span onclick="toggleMode()">Sign In</span>';
                emailGroup.style.display = 'flex';
            } else {
                formTitle.innerText = "SIGN IN";
                submitBtn.innerText = "Authenticate";
                switchText.innerHTML = 'New here? <span onclick="toggleMode()">Create an account</span>';
                emailGroup.style.display = 'none';
            }
        }

        function handleAuthentication(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (isSignUp) {
                authDatabase.push({ username, password });
                localStorage.setItem('users_auth_db', JSON.stringify(authDatabase));
                alert("Account successfully registered. You can now Sign In.");
                toggleMode();
            } else {
                const userExists = authDatabase.find(u => u.username === username && u.password === password);
                
                if (userExists || (username === "admin" && password === "admin")) {
                    document.getElementById('errorMessage').style.display = 'none';

                    gsap.to("#auth-screen", {
                        opacity: 0,
                        duration: 0.6,
                        ease: "power2.inOut"
                    }).then(() => {
                        document.getElementById('auth-screen').style.display = 'none';
                        const workspace = document.getElementById('mainWorkspace');
                        workspace.style.visibility = "visible";
                        
                        gsap.to(workspace, {
                            opacity: 1,
                            scale: 1,
                            duration: 1.2,
                            ease: "power4.out"
                        });
                    });
                } else {
                    document.getElementById('errorMessage').style.display = 'block';
                }
            }
        }

        function handleLogout() {
            const workspace = document.getElementById('mainWorkspace');
            
            gsap.to(workspace, {
                opacity: 0,
                scale: 0.96,
                duration: 0.5,
                ease: "power2.inOut"
            }).then(() => {
                workspace.style.visibility = "hidden";
                const authScreen = document.getElementById('auth-screen');
                authScreen.style.display = 'flex';
                
                gsap.to(authScreen, {
                    opacity: 1,
                    duration: 0.7,
                    ease: "power2.out"
                });
            });
        }
    </script>
</body>
</html>
